stages:
  - deploy

deploy:
  stage: deploy
  script:
    - apt-get update -y && apt-get install -y openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | ssh-add -
    - mkdir -p ~/.ssh
    - ssh-keyscan -H 168.119.96.187 >> ~/.ssh/known_hosts
    - ssh root@168.119.96.187 "cd /app && git fetch origin && git reset --hard origin/main && /usr/local/bin/docker-compose up -d --build"
  only:
    - main